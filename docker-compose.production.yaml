services:
  base: &base
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    image: chatwoot-growfik-v15:latest
    env_file: .env
    volumes:
      - storage_data_v15:/app/storage

  migrations:
    <<: *base
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: bundle exec rails db:migrate
    restart: on-failure

  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
      - migrations
    ports:
      - '0.0.0.0:3011:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    restart: always

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
      - migrations
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '127.0.0.1:5545:5432'
    volumes:
      - postgres_data_v15:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot_v15
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Pg_Str0ng_Chatwoot_2026

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"Rd_Str0ng_Chatwoot_2026\""]
    volumes:
      - redis_data_v15:/data
    ports:
      - '127.0.0.1:6391:6379'

volumes:
  storage_data_v15:
  postgres_data_v15:
  redis_data_v15:
